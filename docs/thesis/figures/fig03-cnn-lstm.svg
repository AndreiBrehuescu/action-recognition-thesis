<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="820" height="380" fill="#ffffff"/>
  <defs>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#C44E52"/>
    </marker>
    <marker id="arrRb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#9c8a3f"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#222">ResNet-50 + Bidirectional LSTM — CNN-RNN (LRCN)</text>
  <text x="410" y="47" text-anchor="middle" font-size="11.5" fill="#777">Same ResNet-50 backbone as TSN, but a recurrent network models the temporal order of the frame features</text>

  <!-- frame stack -->
  <text x="74" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#444">16 frames</text>
  <rect x="34" y="100" width="74" height="46" rx="4" fill="#f0d8d9" stroke="#cf9b9d"/>
  <rect x="42" y="110" width="74" height="46" rx="4" fill="#eccccd" stroke="#cf9b9d"/>
  <rect x="50" y="120" width="74" height="46" rx="4" fill="#e6bcbe" stroke="#cf9b9d"/>
  <text x="87" y="148" text-anchor="middle" font-size="9.5" fill="#7a3f42">t = 1 … 16</text>

  <line x1="128" y1="134" x2="170" y2="134" stroke="#C44E52" stroke-width="1.8" marker-end="url(#arrR)"/>

  <!-- ResNet-50 fc->Identity -->
  <rect x="176" y="96" width="132" height="78" rx="8" fill="#fbeded" stroke="#C44E52" stroke-width="2"/>
  <text x="242" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#823237">ResNet-50</text>
  <text x="242" y="142" text-anchor="middle" font-size="10" fill="#73484a">fc → Identity</text>
  <text x="242" y="159" text-anchor="middle" font-size="10" fill="#73484a">(2048-d features)</text>

  <line x1="310" y1="134" x2="352" y2="134" stroke="#C44E52" stroke-width="1.8" marker-end="url(#arrR)"/>
  <text x="331" y="125" text-anchor="middle" font-size="9" fill="#C44E52">per frame</text>

  <!-- feature sequence -->
  <text x="470" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#444">feature sequence  (16 × 2048)</text>
  <g fill="#C44E52" opacity="0.85">
    <rect x="360" y="108" width="14" height="52" rx="2"/>
    <rect x="392" y="108" width="14" height="52" rx="2"/>
    <rect x="424" y="108" width="14" height="52" rx="2"/>
    <rect x="456" y="108" width="14" height="52" rx="2"/>
    <rect x="520" y="108" width="14" height="52" rx="2"/>
    <rect x="552" y="108" width="14" height="52" rx="2"/>
  </g>
  <text x="495" y="138" text-anchor="middle" font-size="14" fill="#999">· · ·</text>

  <!-- BiLSTM band -->
  <rect x="344" y="196" width="240" height="96" rx="10" fill="#fdf6f6" stroke="#C44E52" stroke-width="1.6"/>
  <text x="464" y="216" text-anchor="middle" font-size="12.5" font-weight="700" fill="#823237">Bidirectional LSTM</text>
  <text x="464" y="232" text-anchor="middle" font-size="9.5" fill="#8a5a5c">hidden = 512 each direction → 1024-d</text>
  <!-- lstm cells -->
  <g>
    <rect x="360" y="244" width="34" height="30" rx="4" fill="#ffffff" stroke="#C44E52"/>
    <rect x="404" y="244" width="34" height="30" rx="4" fill="#ffffff" stroke="#C44E52"/>
    <rect x="448" y="244" width="34" height="30" rx="4" fill="#ffffff" stroke="#C44E52"/>
    <rect x="492" y="244" width="34" height="30" rx="4" fill="#ffffff" stroke="#C44E52"/>
    <rect x="536" y="244" width="34" height="30" rx="4" fill="#ffffff" stroke="#C44E52"/>
  </g>
  <!-- forward arrows (red) -->
  <g stroke="#C44E52" stroke-width="1.5">
    <line x1="394" y1="252" x2="402" y2="252" marker-end="url(#arrR)"/>
    <line x1="438" y1="252" x2="446" y2="252" marker-end="url(#arrR)"/>
    <line x1="482" y1="252" x2="490" y2="252" marker-end="url(#arrR)"/>
    <line x1="526" y1="252" x2="534" y2="252" marker-end="url(#arrR)"/>
  </g>
  <!-- backward arrows (olive) -->
  <g stroke="#9c8a3f" stroke-width="1.5">
    <line x1="536" y1="266" x2="528" y2="266" marker-end="url(#arrRb)"/>
    <line x1="492" y1="266" x2="484" y2="266" marker-end="url(#arrRb)"/>
    <line x1="448" y1="266" x2="440" y2="266" marker-end="url(#arrRb)"/>
    <line x1="404" y1="266" x2="396" y2="266" marker-end="url(#arrRb)"/>
  </g>
  <text x="615" y="256" text-anchor="middle" font-size="9" fill="#C44E52">→ forward</text>
  <text x="615" y="270" text-anchor="middle" font-size="9" fill="#9c8a3f">← backward</text>

  <!-- arrows feature seq -> bilstm -->
  <line x1="464" y1="166" x2="464" y2="192" stroke="#C44E52" stroke-width="1.8" marker-end="url(#arrR)"/>

  <!-- mean pool + fc -->
  <line x1="344" y1="244" x2="300" y2="244" stroke="#C44E52" stroke-width="1.8" marker-end="url(#arrR)"/>
  <rect x="150" y="218" width="150" height="52" rx="8" fill="#C44E52"/>
  <text x="225" y="240" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">Mean-pool over t</text>
  <text x="225" y="257" text-anchor="middle" font-size="10" fill="#f4dada">→ Linear(1024 → C)</text>

  <line x1="225" y1="270" x2="225" y2="306" stroke="#C44E52" stroke-width="1.8" marker-end="url(#arrR)"/>
  <rect x="150" y="312" width="150" height="46" rx="8" fill="#ffffff" stroke="#C44E52" stroke-width="2"/>
  <text x="225" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#823237">Class logits</text>
  <text x="225" y="351" text-anchor="middle" font-size="10" fill="#555">[B, num_classes]</text>

  <!-- contrast note -->
  <rect x="620" y="300" width="184" height="62" rx="8" fill="#fafafa" stroke="#e3e3e3"/>
  <text x="712" y="320" text-anchor="middle" font-size="10.5" font-weight="600" fill="#555">vs TSN</text>
  <text x="712" y="337" text-anchor="middle" font-size="9.5" fill="#777">recurrence replaces</text>
  <text x="712" y="350" text-anchor="middle" font-size="9.5" fill="#777">plain averaging</text>
</svg>
