<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="760" height="420" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#222">Controlled Ablation: Recurrence vs Temporal Averaging</text>
  <text x="380" y="48" text-anchor="middle" font-size="12" fill="#777">Identical ImageNet-pretrained ResNet-50 backbone; only the temporal aggregation differs</text>

  <!-- ============================================================
       LEFT PANEL: HMDB51 Accuracy, zoomed y-axis 72..76
       Plot area: x 55..320, y 65..345 (height 280px)
       scale: (a-72)/4 * 280
       TSN:  (74.27-72)/4*280 = 2.27/4*280 = 158.9, bar_y=345-158.9=186.1
       LSTM: (75.05-72)/4*280 = 3.05/4*280 = 213.5, bar_y=345-213.5=131.5
       bar centers: TSN=145, LSTM=230, width=60
       ============================================================ -->

  <!-- Panel sub-title -->
  <text x="187" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#444">HMDB51 Top-1 Accuracy (%)</text>

  <!-- Y-axis gridlines + tick labels: 72 to 76 every 0.5 -->
  <!-- y = 345 - (a-72)/4*280 -->
  <!-- 72.0 -> 345, 72.5 -> 310, 73.0 -> 275, 73.5 -> 240, 74.0 -> 205,
       74.5 -> 170, 75.0 -> 135, 75.5 -> 100, 76.0 -> 65 -->
  <g font-size="11" fill="#999">
    <line x1="55" y1="345" x2="320" y2="345" stroke="#ccc"/>
    <text x="49" y="349" text-anchor="end">72.0</text>

    <line x1="55" y1="310" x2="320" y2="310" stroke="#eee"/>
    <text x="49" y="314" text-anchor="end">72.5</text>

    <line x1="55" y1="275" x2="320" y2="275" stroke="#eee"/>
    <text x="49" y="279" text-anchor="end">73.0</text>

    <line x1="55" y1="240" x2="320" y2="240" stroke="#eee"/>
    <text x="49" y="244" text-anchor="end">73.5</text>

    <line x1="55" y1="205" x2="320" y2="205" stroke="#eee"/>
    <text x="49" y="209" text-anchor="end">74.0</text>

    <line x1="55" y1="170" x2="320" y2="170" stroke="#eee"/>
    <text x="49" y="174" text-anchor="end">74.5</text>

    <line x1="55" y1="135" x2="320" y2="135" stroke="#eee"/>
    <text x="49" y="139" text-anchor="end">75.0</text>

    <line x1="55" y1="100" x2="320" y2="100" stroke="#eee"/>
    <text x="49" y="104" text-anchor="end">75.5</text>

    <line x1="55" y1="65" x2="320" y2="65" stroke="#eee"/>
    <text x="49" y="69" text-anchor="end">76.0</text>
  </g>

  <!-- Y-axis left border -->
  <line x1="55" y1="65" x2="55" y2="345" stroke="#ccc" stroke-width="1"/>

  <!-- Y-axis title -->
  <text x="18" y="205" text-anchor="middle" font-size="12" fill="#666" transform="rotate(-90 18 205)">HMDB51 Top-1 (%)</text>

  <!-- ZOOMED AXIS BREAK indicator (zigzag at bottom) -->
  <polyline points="55,348 65,354 75,348 85,354 95,348" fill="none" stroke="#aaa" stroke-width="1.2"/>
  <text x="187" y="368" text-anchor="middle" font-size="9.5" fill="#aaa" font-style="italic">(axis breaks below 72%)</text>

  <!-- ResNet-50 TSN bar: h=158.9, y=186.1, x=115..175, center=145 -->
  <rect x="115" y="186" width="60" height="159" fill="#4C72B0"/>
  <text x="145" y="180" text-anchor="middle" font-size="10.5" fill="#333" font-weight="600">74.27%</text>

  <!-- ResNet-50 + LSTM bar: h=213.5, y=131.5, x=200..260, center=230 -->
  <rect x="200" y="132" width="60" height="213" fill="#C44E52"/>
  <text x="230" y="126" text-anchor="middle" font-size="10.5" fill="#333" font-weight="600">75.05%</text>

  <!-- Model name labels -->
  <text x="145" y="358" text-anchor="middle" font-size="11" fill="#333" font-weight="600">ResNet-50 TSN</text>
  <text x="145" y="372" text-anchor="middle" font-size="10" fill="#888">Temporal Avg.</text>

  <text x="230" y="358" text-anchor="middle" font-size="11" fill="#333" font-weight="600">ResNet-50 + LSTM</text>
  <text x="230" y="372" text-anchor="middle" font-size="10" fill="#888">Recurrence</text>

  <!-- Delta annotation: "+0.78 pp" between the two bars -->
  <!-- TSN top y=186, LSTM top y=132; midpoint y = (186+132)/2 = 159, x between bars ~187 -->
  <defs>
    <marker id="arrowup" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <path d="M0,6 L3.5,0 L7,6 z" fill="#555"/>
    </marker>
    <marker id="arrowdown" markerWidth="7" markerHeight="7" refX="3.5" refY="1" orient="auto">
      <path d="M0,1 L3.5,7 L7,1 z" fill="#555"/>
    </marker>
  </defs>
  <!-- Bracket lines from TSN top (y=186) to LSTM top (y=132) at x=285 -->
  <line x1="178" y1="186" x2="290" y2="186" stroke="#999" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="263" y1="132" x2="290" y2="132" stroke="#999" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="290" y1="186" x2="290" y2="132" stroke="#555" stroke-width="1.4" marker-start="url(#arrowdown)" marker-end="url(#arrowup)"/>
  <rect x="294" y="149" width="52" height="18" rx="3" fill="#fffbe6" stroke="#e6c200" stroke-width="0.8"/>
  <text x="320" y="162" text-anchor="middle" font-size="10.5" fill="#7a6000" font-weight="700">+0.78 pp</text>

  <!-- ============================================================
       DIVIDER
       ============================================================ -->
  <line x1="355" y1="55" x2="355" y2="390" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============================================================
       RIGHT PANEL: Cost of Recurrence callout box
       ============================================================ -->

  <!-- Panel sub-title -->
  <text x="558" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#444">Cost of Adding Recurrence</text>

  <!-- Outer callout box -->
  <rect x="375" y="72" width="365" height="278" rx="8" fill="#f7f7f7" stroke="#ddd" stroke-width="1.2"/>

  <!-- Section divider: Benefits -->
  <rect x="375" y="72" width="365" height="32" rx="8" fill="#e8f5e9" stroke="#ddd" stroke-width="0"/>
  <rect x="375" y="88" width="365" height="16" fill="#e8f5e9"/><!-- square off bottom corners of top section -->
  <text x="558" y="93" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2e7d32">Accuracy Gains</text>

  <!-- Green check marks + accuracy lines -->
  <!-- Check mark as text character -->
  <text x="393" y="124" font-size="13" fill="#43a047">&#x2713;</text>
  <text x="413" y="124" font-size="11.5" fill="#333" font-weight="600">+0.78 pp</text>
  <text x="480" y="124" font-size="11.5" fill="#555">HMDB51 accuracy</text>

  <text x="393" y="148" font-size="13" fill="#43a047">&#x2713;</text>
  <text x="413" y="148" font-size="11.5" fill="#333" font-weight="600">+0.32 pp</text>
  <text x="480" y="148" font-size="11.5" fill="#555">UCF101 accuracy</text>

  <!-- Divider line -->
  <line x1="390" y1="163" x2="725" y2="163" stroke="#ddd" stroke-width="1"/>

  <!-- Section: Costs -->
  <text x="558" y="182" text-anchor="middle" font-size="11.5" font-weight="700" fill="#e65100">Efficiency Costs</text>

  <!-- Orange dot + cost lines -->
  <circle cx="399" cy="202" r="5" fill="#FF8C00"/>
  <text x="413" y="207" font-size="11.5" fill="#333" font-weight="600">+10.40 M</text>
  <text x="495" y="207" font-size="11.5" fill="#555">parameters (+44%)</text>

  <circle cx="399" cy="228" r="5" fill="#FF8C00"/>
  <text x="413" y="233" font-size="11.5" fill="#333" font-weight="600">+42 MB</text>
  <text x="470" y="233" font-size="11.5" fill="#555">peak GPU memory</text>

  <circle cx="399" cy="254" r="5" fill="#FF8C00"/>
  <text x="413" y="259" font-size="11.5" fill="#333" font-weight="600">+0.94 ms</text>
  <text x="475" y="259" font-size="11.5" fill="#555">inference latency</text>

  <!-- Divider line -->
  <line x1="390" y1="273" x2="725" y2="273" stroke="#ddd" stroke-width="1"/>

  <!-- Summary verdict -->
  <text x="558" y="296" text-anchor="middle" font-size="11" fill="#555" font-style="italic">Marginal accuracy improvement at moderate</text>
  <text x="558" y="312" text-anchor="middle" font-size="11" fill="#555" font-style="italic">parameter and memory overhead.</text>

  <!-- Model specs mini-table headers -->
  <text x="393" y="340" font-size="10.5" fill="#888">ResNet-50 TSN:   23.71 M params, 281 MB, 18.39 ms</text>
  <text x="393" y="356" font-size="10.5" fill="#888">ResNet-50+LSTM:  34.11 M params, 323 MB, 19.33 ms</text>

</svg>
