<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="720" height="440" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#222">Top-1 Accuracy: UCF101 vs HMDB51</text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#777">Same 10-epoch protocol, single-clip evaluation, NVIDIA L4 GPU</text>

  <!-- y axis gridlines + labels (plot area y: 70=100%  ->  370=0%) -->
  <g font-size="11" fill="#999">
    <line x1="90" y1="70"  x2="690" y2="70"  stroke="#eee"/><text x="82" y="74"  text-anchor="end">100</text>
    <line x1="90" y1="130" x2="690" y2="130" stroke="#eee"/><text x="82" y="134" text-anchor="end">80</text>
    <line x1="90" y1="190" x2="690" y2="190" stroke="#eee"/><text x="82" y="194" text-anchor="end">60</text>
    <line x1="90" y1="250" x2="690" y2="250" stroke="#eee"/><text x="82" y="254" text-anchor="end">40</text>
    <line x1="90" y1="310" x2="690" y2="310" stroke="#eee"/><text x="82" y="314" text-anchor="end">20</text>
    <line x1="90" y1="370" x2="690" y2="370" stroke="#ccc"/><text x="82" y="374" text-anchor="end">0</text>
  </g>
  <text x="34" y="220" text-anchor="middle" font-size="12" fill="#666" transform="rotate(-90 34 220)">Top-1 Accuracy (%)</text>

  <!-- clusters: centers at 165, 295, 425, 555 ; UCF bar = center-44..-4, HMDB bar = center+4..+44 -->
  <!-- height = value/100 * 300 ; y = 370 - height -->
  <g>
    <!-- ResNet-50 TSN -->
    <rect x="121" y="77.2" width="40" height="292.8" fill="#4C72B0"/>
    <rect x="169" y="147.2" width="40" height="222.8" fill="#DD8452"/>
    <text x="141" y="71"  text-anchor="middle" font-size="10.5" fill="#333">97.59</text>
    <text x="189" y="141" text-anchor="middle" font-size="10.5" fill="#333">74.27</text>
    <text x="165" y="388" text-anchor="middle" font-size="11.5" fill="#333" font-weight="600">ResNet-50 TSN</text>
    <text x="165" y="403" text-anchor="middle" font-size="10" fill="#888">2D-CNN</text>

    <!-- ResNet-50 + LSTM -->
    <rect x="251" y="76.3" width="40" height="293.7" fill="#4C72B0"/>
    <rect x="299" y="144.9" width="40" height="225.1" fill="#DD8452"/>
    <text x="271" y="70"  text-anchor="middle" font-size="10.5" fill="#333">97.91</text>
    <text x="319" y="139" text-anchor="middle" font-size="10.5" fill="#333">75.05</text>
    <text x="295" y="388" text-anchor="middle" font-size="11.5" fill="#333" font-weight="600">ResNet-50 + LSTM</text>
    <text x="295" y="403" text-anchor="middle" font-size="10" fill="#888">CNN-RNN</text>

    <!-- R(2+1)D-18 -->
    <rect x="381" y="76.0" width="40" height="294.0" fill="#4C72B0"/>
    <rect x="429" y="131.1" width="40" height="238.9" fill="#DD8452"/>
    <text x="401" y="70"  text-anchor="middle" font-size="10.5" fill="#333">98.00</text>
    <text x="449" y="125" text-anchor="middle" font-size="10.5" fill="#333">79.63</text>
    <text x="425" y="388" text-anchor="middle" font-size="11.5" fill="#333" font-weight="600">R(2+1)D-18</text>
    <text x="425" y="403" text-anchor="middle" font-size="10" fill="#888">3D-CNN</text>

    <!-- VideoMAE -->
    <rect x="511" y="75.6" width="40" height="294.4" fill="#4C72B0"/>
    <rect x="559" y="113.6" width="40" height="256.4" fill="#DD8452"/>
    <text x="531" y="69"  text-anchor="middle" font-size="10.5" fill="#333">98.14</text>
    <text x="579" y="108" text-anchor="middle" font-size="10.5" fill="#333" font-weight="700">85.48</text>
    <text x="555" y="388" text-anchor="middle" font-size="11.5" fill="#333" font-weight="600">VideoMAE</text>
    <text x="555" y="403" text-anchor="middle" font-size="10" fill="#888">Transformer</text>
  </g>

  <!-- legend -->
  <g font-size="12" fill="#444">
    <rect x="250" y="420" width="14" height="14" fill="#4C72B0"/><text x="270" y="431">UCF101</text>
    <rect x="340" y="420" width="14" height="14" fill="#DD8452"/><text x="360" y="431">HMDB51</text>
  </g>
</svg>
