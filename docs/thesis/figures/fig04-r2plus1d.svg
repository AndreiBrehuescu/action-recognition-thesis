<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="820" height="420" fill="#ffffff"/>
  <defs>
    <marker id="arrO" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#DD8452"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#222">R(2+1)D-18 — 3D-CNN with Factorised Spatiotemporal Convolutions</text>
  <text x="410" y="47" text-anchor="middle" font-size="11.5" fill="#777">Each 3D convolution is split into a 2D spatial conv followed by a 1D temporal conv, with a ReLU in between</text>

  <!-- ===== top: the factorisation ===== -->
  <text x="150" y="80" text-anchor="middle" font-size="12.5" font-weight="700" fill="#444">Full 3D convolution</text>
  <rect x="74" y="92" width="152" height="92" rx="8" fill="#fdf0e7" stroke="#c98a5f"/>
  <text x="150" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5328">t × d × d</text>
  <text x="150" y="146" text-anchor="middle" font-size="10.5" fill="#7a5a44">joint space + time</text>
  <text x="150" y="163" text-anchor="middle" font-size="10.5" fill="#7a5a44">in one kernel</text>

  <!-- factorize arrow -->
  <line x1="232" y1="138" x2="298" y2="138" stroke="#DD8452" stroke-width="2" marker-end="url(#arrO)"/>
  <text x="265" y="128" text-anchor="middle" font-size="10" fill="#DD8452" font-weight="600">factorise</text>

  <!-- (2+1)D block -->
  <rect x="306" y="76" width="436" height="124" rx="10" fill="#fff8f3" stroke="#DD8452" stroke-width="2"/>
  <text x="524" y="96" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a5328">(2+1)D block</text>

  <rect x="324" y="112" width="120" height="72" rx="8" fill="#ffffff" stroke="#DD8452"/>
  <text x="384" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5328">1 × d × d</text>
  <text x="384" y="159" text-anchor="middle" font-size="10" fill="#7a5a44">2D spatial conv</text>
  <text x="384" y="174" text-anchor="middle" font-size="9.5" fill="#999">appearance</text>

  <g>
    <line x1="446" y1="148" x2="486" y2="148" stroke="#DD8452" stroke-width="1.8" marker-end="url(#arrO)"/>
    <text x="466" y="139" text-anchor="middle" font-size="9.5" fill="#cc5500" font-weight="700">ReLU</text>
  </g>

  <rect x="492" y="112" width="120" height="72" rx="8" fill="#ffffff" stroke="#DD8452"/>
  <text x="552" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5328">t × 1 × 1</text>
  <text x="552" y="159" text-anchor="middle" font-size="10" fill="#7a5a44">1D temporal conv</text>
  <text x="552" y="174" text-anchor="middle" font-size="9.5" fill="#999">motion</text>

  <g font-size="9.5" fill="#777">
    <text x="678" y="132" text-anchor="middle">+ extra ReLU →</text>
    <text x="678" y="146" text-anchor="middle">more non-linear,</text>
    <text x="678" y="160" text-anchor="middle">easier to optimise</text>
    <text x="678" y="174" text-anchor="middle">than full 3D</text>
  </g>

  <!-- ===== bottom: network flow ===== -->
  <text x="410" y="234" text-anchor="middle" font-size="12.5" font-weight="700" fill="#444">R(2+1)D-18 network  (Kinetics-400 pretrained)</text>

  <g>
    <rect x="40" y="252" width="96" height="74" rx="8" fill="#f6f6f6" stroke="#bbb"/>
    <text x="88" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#444">Input clip</text>
    <text x="88" y="299" text-anchor="middle" font-size="9.5" fill="#777">[B,3,16,</text>
    <text x="88" y="312" text-anchor="middle" font-size="9.5" fill="#777">224,224]</text>

    <rect x="160" y="252" width="86" height="74" rx="8" fill="#fdf0e7" stroke="#DD8452"/>
    <text x="203" y="285" text-anchor="middle" font-size="11" font-weight="700" fill="#8a5328">Conv stem</text>
    <text x="203" y="302" text-anchor="middle" font-size="9.5" fill="#7a5a44">(2+1)D</text>

    <rect x="270" y="252" width="200" height="74" rx="8" fill="#fff8f3" stroke="#DD8452"/>
    <text x="370" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#8a5328">4 residual stages</text>
    <text x="370" y="298" text-anchor="middle" font-size="9.5" fill="#7a5a44">stacked (2+1)D blocks, channels ↑</text>
    <text x="370" y="313" text-anchor="middle" font-size="9.5" fill="#7a5a44">temporal dim retained until late</text>

    <rect x="494" y="252" width="104" height="74" rx="8" fill="#fdf0e7" stroke="#DD8452"/>
    <text x="546" y="282" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a5328">Global</text>
    <text x="546" y="298" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a5328">avg pool</text>
    <text x="546" y="314" text-anchor="middle" font-size="9.5" fill="#7a5a44">over t,h,w</text>

    <rect x="622" y="252" width="120" height="74" rx="8" fill="#DD8452"/>
    <text x="682" y="284" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Linear → logits</text>
    <text x="682" y="301" text-anchor="middle" font-size="9.5" fill="#fbeee4">[B, num_classes]</text>
  </g>
  <g stroke="#DD8452" stroke-width="1.8">
    <line x1="136" y1="289" x2="156" y2="289" marker-end="url(#arrO)"/>
    <line x1="246" y1="289" x2="266" y2="289" marker-end="url(#arrO)"/>
    <line x1="470" y1="289" x2="490" y2="289" marker-end="url(#arrO)"/>
    <line x1="598" y1="289" x2="618" y2="289" marker-end="url(#arrO)"/>
  </g>

  <!-- footer note -->
  <rect x="120" y="352" width="580" height="44" rx="8" fill="#fafafa" stroke="#e8e8e8"/>
  <text x="410" y="372" text-anchor="middle" font-size="10.5" font-weight="600" fill="#555">Carrying a temporal dimension through every layer makes R(2+1)D the most GFLOP- and memory-heavy model here</text>
  <text x="410" y="387" text-anchor="middle" font-size="10" fill="#888">162.6 GFLOPs/clip · 582 MB peak — despite only 31 M parameters</text>
</svg>
