<svg viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="880" height="380" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#888"/>
    </marker>
  </defs>

  <text x="440" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#222">End-to-End Evaluation Pipeline</text>
  <text x="440" y="50" text-anchor="middle" font-size="12" fill="#777">A single shared interface — clip (B, T, C, H, W) → logits (B, num_classes) — keeps every stage model-agnostic</text>

  <!-- pipeline boxes -->
  <g>
    <!-- 1 raw video -->
    <rect x="20" y="78" width="128" height="88" rx="8" fill="#f3f6fb" stroke="#9bb0cf"/>
    <text x="84" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#2c3e50">Raw Video</text>
    <text x="84" y="126" text-anchor="middle" font-size="10.5" fill="#5a6b7b">UCF101 .avi files</text>
    <text x="84" y="141" text-anchor="middle" font-size="10.5" fill="#5a6b7b">HMDB51 frame</text>
    <text x="84" y="155" text-anchor="middle" font-size="10.5" fill="#5a6b7b">folders (JPG)</text>

    <!-- 2 sample -->
    <rect x="190" y="78" width="128" height="88" rx="8" fill="#f3f6fb" stroke="#9bb0cf"/>
    <text x="254" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#2c3e50">Uniform Sample</text>
    <text x="254" y="127" text-anchor="middle" font-size="10.5" fill="#5a6b7b">16 frames spread</text>
    <text x="254" y="141" text-anchor="middle" font-size="10.5" fill="#5a6b7b">across the clip</text>
    <text x="254" y="155" text-anchor="middle" font-size="10.5" fill="#5a6b7b">decord / PIL</text>

    <!-- 3 transform -->
    <rect x="360" y="78" width="128" height="88" rx="8" fill="#f3f6fb" stroke="#9bb0cf"/>
    <text x="424" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#2c3e50">Transform</text>
    <text x="424" y="127" text-anchor="middle" font-size="10.5" fill="#5a6b7b">resize → crop 224²</text>
    <text x="424" y="141" text-anchor="middle" font-size="10.5" fill="#5a6b7b">ImageNet norm</text>
    <text x="424" y="155" text-anchor="middle" font-size="10" fill="#33485c" font-weight="600">[B,16,3,224,224]</text>

    <!-- 4 model (highlighted) -->
    <rect x="530" y="78" width="128" height="88" rx="8" fill="#fff6ec" stroke="#DD8452" stroke-width="2"/>
    <text x="594" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#7a4a1f">Model</text>
    <text x="594" y="129" text-anchor="middle" font-size="10.5" fill="#7a4a1f">one of four</text>
    <text x="594" y="143" text-anchor="middle" font-size="10.5" fill="#7a4a1f">architecture</text>
    <text x="594" y="157" text-anchor="middle" font-size="10.5" fill="#7a4a1f">families</text>

    <!-- 5 logits + eval -->
    <rect x="700" y="78" width="128" height="88" rx="8" fill="#eef7f0" stroke="#7bbf93"/>
    <text x="764" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#2f5d3f">Evaluate</text>
    <text x="764" y="127" text-anchor="middle" font-size="10.5" fill="#436b52">logits → Top-1</text>
    <text x="764" y="141" text-anchor="middle" font-size="10.5" fill="#436b52">+ GFLOPs, latency,</text>
    <text x="764" y="155" text-anchor="middle" font-size="10.5" fill="#436b52">memory (fvcore)</text>
  </g>

  <!-- arrows between boxes -->
  <g stroke="#888" stroke-width="1.6">
    <line x1="148" y1="122" x2="186" y2="122" marker-end="url(#arr)"/>
    <line x1="318" y1="122" x2="356" y2="122" marker-end="url(#arr)"/>
    <line x1="488" y1="122" x2="526" y2="122" marker-end="url(#arr)"/>
    <line x1="658" y1="122" x2="696" y2="122" marker-end="url(#arr)"/>
  </g>

  <!-- model family chips -->
  <line x1="594" y1="166" x2="594" y2="210" stroke="#bbb" stroke-width="1.4" stroke-dasharray="3 3"/>
  <g>
    <rect x="92"  y="236" width="170" height="60" rx="8" fill="#ffffff" stroke="#4C72B0" stroke-width="2"/>
    <rect x="92"  y="236" width="8"  height="60" rx="0" fill="#4C72B0"/>
    <text x="181" y="262" text-anchor="middle" font-size="12.5" font-weight="700" fill="#2f4b73">2D-CNN</text>
    <text x="181" y="281" text-anchor="middle" font-size="10.5" fill="#555">ResNet-50 TSN</text>

    <rect x="282" y="236" width="170" height="60" rx="8" fill="#ffffff" stroke="#C44E52" stroke-width="2"/>
    <rect x="282" y="236" width="8"  height="60" rx="0" fill="#C44E52"/>
    <text x="371" y="262" text-anchor="middle" font-size="12.5" font-weight="700" fill="#823237">CNN-RNN</text>
    <text x="371" y="281" text-anchor="middle" font-size="10.5" fill="#555">ResNet-50 + LSTM</text>

    <rect x="472" y="236" width="150" height="60" rx="8" fill="#ffffff" stroke="#DD8452" stroke-width="2"/>
    <rect x="472" y="236" width="8"  height="60" rx="0" fill="#DD8452"/>
    <text x="551" y="262" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a5328">3D-CNN</text>
    <text x="551" y="281" text-anchor="middle" font-size="10.5" fill="#555">R(2+1)D-18</text>

    <rect x="642" y="236" width="150" height="60" rx="8" fill="#ffffff" stroke="#55A868" stroke-width="2"/>
    <rect x="642" y="236" width="8"  height="60" rx="0" fill="#55A868"/>
    <text x="721" y="262" text-anchor="middle" font-size="12.5" font-weight="700" fill="#356b45">Transformer</text>
    <text x="721" y="281" text-anchor="middle" font-size="10.5" fill="#555">VideoMAE (ViT-B)</text>
  </g>

  <!-- shared protocol footer -->
  <rect x="92" y="318" width="700" height="40" rx="8" fill="#fafafa" stroke="#e3e3e3"/>
  <text x="442" y="337" text-anchor="middle" font-size="11.5" font-weight="600" fill="#444">Shared protocol: 10 epochs · AdamW (lr 1e-4) · cosine LR · batch 8 · FP16 AMP · 16 frames @ 224² · single-clip eval</text>
  <text x="442" y="351" text-anchor="middle" font-size="10.5" fill="#888">Only the model changes between runs — so accuracy and efficiency differences are attributable to architecture alone</text>
</svg>
